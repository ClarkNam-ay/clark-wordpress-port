					<style id="wp-custom-css">
			:root{
	/**** all custom colors ****/
	--White: #FFFFFF;
	--Primary_accent: #66FCF7;
	--Secondary_accent: #45A29E;
	--Dark_surface: #1F2F33;
	--Black_bg: #0B0C10;
	--Light_gray: #C5C6C7;
}

/* Gradient text */
.grad{
	background: linear-gradient(
		to right,
		var(--Primary_accent) 0%,
		var(--White) 100%
	);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}

/* Image hover border */
.img_hover_color:hover img{
	border-color: var(--Primary_accent) !important;
}

/* Service hover */
.service_hover:hover .elementor-heading-title{
	color: var(--White) !important;
}

.service_hover:hover .e-font-icon-svg {
	transform: rotate(-90deg);
	fill: var(--White) !important;
}

/* Portfolio filter */
.elpt-portfolio-filter .portfolio-filter-item.item-active {
	background: var(--Secondary_accent);
}

.elpt-portfolio-filter .portfolio-filter-item {
	background: var(--Black_bg);
}

/* Gradient background blobs */
.gradient_bg_right::after,
.gradient_bg_center::after,
.gradient_bg_img::before {
	content: "";
	position: absolute;
	width: 322px;
	height: 308px;
	border-radius: 50%;
	filter: blur(150px);
	background: var(--Primary_accent);
}

/* Individual positioning */
.gradient_bg_right::after {
	top: 0;
	right: 0;
	margin-right: -5%;
	margin-top: -5%;
}

.gradient_bg_center::after {
	top: 50%;
	right: 45%;
	margin-right: -5%;
	margin-top: -5%;
}

.gradient_bg_img img{
	z-index: 1;
	position: relative;
}

.gradient_bg_img::before {
	bottom: 0;
	left: 0;
}

/* Skills hover */
.skill_hover:hover .elementor-image-box-title {
	color: var(--Primary_accent) !important;
}

.skill_hover:hover .elementor-image-box-img img{
	filter: saturate(100%) !important;
}

/* Mobile menu */
#mobile-dropdown {
	background-color: var(--Dark_surface) !important;
}

#mobile-dropdown ul li a {
	text-align: center !important;
	color: var(--Light_gray);
}

/* Remove focus outline */
a:hover,
a:active,
a:focus {
	outline: 0 !important;
}

/* Page header */
.page-header {
	padding: 120px 0 36px 0;
	display: none;
}

/* Profile Animation */
.floating {
  animation: float 4s ease-in-out infinite;
  transform: scale(1.6);
}

/* Force Transparent Navbar */
.sticky-navbar,
.sticky-navbar > div,
.sticky-navbar .elementor-container,
.sticky-navbar .elementor-widget-wrap {
  background: transparent !important;
  background-color: transparent !important;
  box-shadow: none !important;
}

.sticky-navbar {
  position: fixed;
  z-index: 9999;
}

@keyframes float {
  0%   { transform: translateY(0) scale(1.6); }
  50%  { transform: translateY(-15px) scale(1.6); }
  100% { transform: translateY(0) scale(1.6); }
}
